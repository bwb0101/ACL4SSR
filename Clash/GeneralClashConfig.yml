# 基础通用配置
mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: true
external-controller: 0.0.0.0:9090
tcp-concurrent: true

# 核心 DNS 配置：解决 redir-host 循环解析与卡顿
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: redir-host
  respect-rules: false
  # 强制真实 IP 模式的兜底
  fake-ip-filter:
    - "*"
  fake-ip-filter-mode: blacklist
  # 默认 DNS（用于解析下面的 DoH 域名本身）
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
  # 主 DNS：全量交给你本地的 MosDNS
  nameserver:
    - 119.29.29.29
    - 223.5.5.5
  # ✨ 代理节点域名的专属解析
  proxy-server-nameserver:
    - https://223.6.6.6/dns-query
    - https://1.12.12.12/dns-query
  # 国内/国外精准分流，防止dns泄露
  nameserver-policy:
    "geosite:cn,private":
      - https://223.5.5.5/dns-query
      - https://1.12.12.12/dns-query
    "geosite:geolocation-!cn":
      - https://8.8.8.8/dns-query
      - https://1.1.1.1/dns-query
